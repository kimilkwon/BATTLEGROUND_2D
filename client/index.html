<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>BATTLEGROUND 2D</title>
  <style>
    * {
      margin: 0; padding: 0; box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden; background: #000;
      touch-action: none;
    }
    canvas {
      display: block;
      touch-action: none;
    }
    #ui-overlay {
      position: fixed; inset: 0; pointer-events: none; z-index: 10;
      font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', monospace;
    }
    #flash-overlay {
      position: fixed; inset: 0; background: #fff; opacity: 0;
      pointer-events: none; z-index: 20; transition: opacity 0.1s;
    }
    #toast {
      position: fixed; top: 45%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.88); color: #fff; padding: 14px 24px;
      border-radius: 12px; font-size: 1rem; pointer-events: none;
      z-index: 30; display: none; text-align: center;
      font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
      max-width: 80vw; border: 1px solid rgba(255,255,255,0.15);
    }
  </style>
</head>
<body>
  <div id="ui-overlay"></div>
  <div id="flash-overlay"></div>
  <div id="toast"></div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
