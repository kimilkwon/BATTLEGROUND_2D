<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>BATTLEGROUND 2D</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html,body { width:100%; height:100%; overflow:hidden; background:#000; }
    canvas { display:block; }
    #ui-overlay {
      position:fixed; inset:0; pointer-events:none; z-index:10;
      font-family:'Malgun Gothic','Apple SD Gothic Neo',monospace;
    }
    /* Flash effect */
    #flash-overlay {
      position:fixed; inset:0; background:#fff; opacity:0;
      pointer-events:none; z-index:20; transition:opacity 0.1s;
    }
    /* Toast message */
    #toast {
      position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
      background:rgba(0,0,0,0.85); color:#fff; padding:16px 28px;
      border-radius:12px; font-size:1.1rem; pointer-events:none;
      z-index:30; display:none; text-align:center;
    }
  </style>
</head>
<body>
  <div id="ui-overlay"></div>
  <div id="flash-overlay"></div>
  <div id="toast"></div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
